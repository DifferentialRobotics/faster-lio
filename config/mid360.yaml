common:
    lid_topic: "/livox/lidar"
    imu_topic: "/mavros/imu/data"
    # imu_topic: "/mavros/imu/data"

    time_sync_en: false # ONLY turn on when external time synchronization is really not possible

preprocess:
    lidar_type: 1 # 1 for Livox serials LiDAR, 2 for Velodyne LiDAR, 3 for ouster LiDAR,
    scan_line: 4
    blind: 0.4
    time_scale: 1e-9 # MID-360 uses nanosecond timestamp

mapping:
    acc_cov: 0.1
    gyr_cov: 0.1
    b_acc_cov: 0.0001
    b_gyr_cov: 0.0001
    fov_degree: 360
    det_range: 100.0
    extrinsic_est_en: false # true: enable the online estimation of IMU-LiDAR extrinsic
    
    # ==================== IMU Configuration Options ====================
    # Option 1: /livox/imu
    # extrinsic_T: [-0.011, -0.02329, 0.04412]
    # extrinsic_R: [1, 0, 0, 0, 1, 0, 0, 0, 1]
    # imu_body_T: [0.094614, -0.012512, 0.0437]
    # imu_body_R: [ 0.9659258, 0, -0.2588190, 0, 1, 0, 0.2588190, 0, 0.9659258]
    
    # Option 2: /mavros/imu/data
    extrinsic_T: [0.094614, -0.012512, 0.0437]
    extrinsic_R: [0.9659258, -0, 0.2588190, 0, 1, 0, -0.2588190, 0, 0.9659258]
    imu_body_T: [ 0.0, 0.0, 0.0]
    imu_body_R: [ 1, 0, 0, 0, 1, 0, 0, 0, 1]
    # ===================================================================

publish:
    path_publish_en: true
    scan_publish_en: true # false: close all the point cloud output
    dense_publish_en: false # false: low down the points number in a global-frame point clouds scan.
    scan_bodyframe_pub_en: true # true: output the point cloud scans in IMU-body-frame
 
pcd_save:
    pcd_save_en: true
    interval:
        -1 # how many LiDAR frames saved in each pcd file;
        # -1 : all frames will be saved in ONE pcd file, may lead to memory crash when having too much frames.
feature_extract_enable: false
point_filter_num: 3
max_iteration: 3
filter_size_surf: 0.5
filter_size_map: 0.5
cube_side_length: 1000

ivox_grid_resolution: 0.5 # default=0.2
ivox_nearby_type: 18 # 6, 18, 26
esti_plane_threshold: 0.1 # default=0.1
